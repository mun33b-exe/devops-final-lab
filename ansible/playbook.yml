---
- name: Configure and verify the devops-lab application
  hosts: local
  gather_facts: yes
  vars:
    container_name: devops-lab-tf
    app_url: http://localhost:3001

  tasks:
    - name: Check that Docker is installed
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Display Docker version
      ansible.builtin.debug:
        msg: "Docker is installed: {{ docker_version.stdout }}"

    - name: Ensure the Terraform-provisioned container is running
      ansible.builtin.shell: docker inspect -f '{{"{{"}}.State.Running{{"}}"}}' {{ container_name }}
      register: container_state
      changed_when: false

    - name: Fail if container is not running
      ansible.builtin.fail:
        msg: "Container {{ container_name }} is not running!"
      when: container_state.stdout != "true"

    - name: Wait for app to respond on /health
      ansible.builtin.uri:
        url: "{{ app_url }}/health"
        status_code: 200
        return_content: yes
      register: health_check
      retries: 10
      delay: 2
      until: health_check.status == 200

    - name: Display health-check response
      ansible.builtin.debug:
        msg: "Health check response: {{ health_check.json }}"

    - name: Render a deployment-info file inside the container
      ansible.builtin.shell: |
        docker exec {{ container_name }} sh -c "echo 'Deployed by: Ansible
        Provisioned by: Terraform
        Image: mun33bexe/devops-lab:latest
        Configured at: $(date)' > /tmp/deployment-info.txt"
      changed_when: true

    - name: Read back the deployment-info file
      ansible.builtin.command: docker exec {{ container_name }} cat /tmp/deployment-info.txt
      register: deployment_info
      changed_when: false

    - name: Show deployment info
      ansible.builtin.debug:
        msg: "{{ deployment_info.stdout_lines }}"

    - name: Print final summary
      ansible.builtin.debug:
        msg:
          - "Infrastructure provisioned by Terraform"
          - "Configuration applied by Ansible"
          - "App responding on {{ app_url }}"
          - "Container: {{ container_name }}"
